<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Progress</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    body {
      align-items: center;
      display: flex;
      justify-content: center;
    }

    text {
      color: #1a1a1a;
      font-family: sans-serif;
      font-size: 48px;
      font-weight: 800;
    }
  </style>
</head>
<body>

  <svg height="320" width="320">
    
    <!-- Track -->
    <circle 
      cx="160" 
      cy="160" 
      fill="none" 
      r="150" 
      stroke="#1a1a1a1a" 
      stroke-width="12" />

    <!-- Line -->
    <!-- Dash array === Circumference === 2 * Math.PI * Radius -->
    <!-- Dash offset === Circumference * ( 1 - Progress )-->
    <circle 
      cx="160" 
      cy="160" 
      fill="none" 
      r="150" 
      stroke-dasharray="943"
      stroke-dashoffset="330"
      stroke="#1a1a1a" 
      stroke-linecap="round"      
      stroke-width="12"
      transform="rotate( -90 160 160 )" />    

    <!-- Label -->
    <text 
      x="50%" 
      y="50%" 
      alignment-baseline="middle" 
      text-anchor="middle">
      00:00:00
    </text>

  </svg>

</body>
</html>
